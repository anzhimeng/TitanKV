syntax = "proto3";
package pdpb;
option go_package = "titankv/pd/api/pdpb";

service PD {
    // 获取时间戳
    rpc GetTS(GetTSRequest) returns (GetTSResponse);
    
    rpc PutStore(PutStoreRequest) returns (PutStoreResponse);
    rpc StoreHeartbeat(StoreHeartbeatRequest) returns (StoreHeartbeatResponse);
    rpc AllocID(AllocIDRequest) returns (AllocIDResponse);
    
    rpc GetRegion(GetRegionRequest) returns (GetRegionResponse);
    rpc RegionHeartbeat(RegionHeartbeatRequest) returns (RegionHeartbeatResponse);
    rpc GetStore(GetStoreRequest) returns (GetStoreResponse);
}


message AllocIDRequest {}

message AllocIDResponse {
    uint64 id = 1;
}


enum StoreState {
    UP = 0;
    OFFLINE = 1; // 手动下线
    TOMBSTONE = 2; // 已删除
}

message MetaStore {
    uint64 id = 1;
    string address = 2;
    StoreState state = 3;
    repeated StoreLabel labels = 4; // 机房、机架信息，用于调度
    string version = 5; // TitanKV 版本
}

message StoreLabel {
    string key = 1;
    string value = 2;
}

message StoreStats {
    uint64 capacity = 1;
    uint64 available = 2;
    uint32 region_count = 3;
    uint32 sending_snap_count = 4;
    uint32 receiving_snap_count = 5;
}

message PutStoreRequest {
    MetaStore store = 1;
}
message PutStoreResponse {} // 实际上可能返回 header

message StoreHeartbeatRequest {
    uint64 store_id = 1;
    StoreStats stats = 2;
}
message StoreHeartbeatResponse {}

message GetTSRequest {
    uint32 count = 1; // 一次申请多少个 TS (通常是 1 个，用于批处理优化)
}

message Timestamp {
    int64 physical = 1; // 物理时钟 (毫秒)
    int64 logical  = 2; // 逻辑时钟
}

message GetTSResponse {
    Timestamp timestamp = 1; // 返回的起始时间戳
    uint32 count = 2;        // 返回的数量
}

message Region {
    uint64 id = 1;
    // Range: [start_key, end_key)
    bytes start_key = 2;
    bytes end_key = 3;
    
    RegionEpoch region_epoch = 4; // 版本控制，防止脑裂和过时路由
    repeated Peer peers = 5;
}

message Peer {
    uint64 id = 1;
    uint64 store_id = 2;
    // bool is_learner = 3; // 进阶：Learner 角色
}

// Region 版本，用于 Split/Merge 保护
message RegionEpoch {
    // 配置变更版本 (AddPeer/RemovePeer)
    uint64 conf_ver = 1;
    // 分裂/合并版本 (Split/Merge)
    uint64 version = 2;
}

message GetRegionRequest {
    bytes key = 1;
}
message GetRegionResponse {
    Region region = 1;
    Peer leader = 2; // 告诉 Client 谁是 Leader
}

message RegionHeartbeatRequest {
    // Region 的元数据 (Range, Epoch, Peers)
    Region region = 1;
    
    // 当前的 Leader 是谁
    Peer leader = 2;
    
    // --- 以下字段用于 Week 9 调度 (Day 4 先占位) ---
    // Region 的大概大小 (MB)
    uint64 approximate_size = 3;
    // Region 包含的 Key 数量
    uint64 approximate_keys = 4;
}

message TransferLeader {
    uint64 peer_id = 1; // 目标 Peer ID
    uint64 store_id = 2; // 目标 Store ID (辅助校验)
}


message RegionHeartbeatResponse {
    uint64 timestamp = 1; // 可选：返回一个 TSO 用于校准
    TransferLeader transfer_leader = 2;
    ChangePeer change_peer = 3;
}

message ChangePeer {
    enum ChangeType {
        ADD_NODE = 0;
        REMOVE_NODE = 1;
        // ADD_LEARNER = 2;
    }
    ChangeType change_type = 1;
    Peer peer = 2; // 包含 PeerID 和 StoreID
}

message RegionContext {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2; // 客户端持有的版本号
    Peer peer = 3; // 客户端认为自己正在发给谁
}

message PutRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
    bytes value = 3;
}

message GetRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message DeleteRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message GetStoreRequest {
    uint64 store_id = 1;
}

message GetStoreResponse {
    MetaStore store = 1;
}

