syntax = "proto3";


package titankv;
option go_package = "titankv/api/titankvpb";

// 定义 KV 服务
service TitanKV {
    // Client API
    rpc Get(GetRequest) returns (GetResponse);
    rpc Put(PutRequest) returns (PutResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    rpc Write(stream WriteRequest) returns (stream WriteResponse);

    // 【新增】Raft Node API
    // 用于节点间传输 Raft 消息 (Vote, AppendEntries, etc.)
    rpc Raft(RaftMessage) returns (RaftResponse);
    rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
    // 双向流：Client 发 Batch，Server 回 Response (可以不回)
    rpc BatchRaft(stream BatchRaftMessage) returns (stream RaftResponse);
    rpc StreamSnapshot(stream SnapshotChunk) returns (RaftResponse);
    rpc Prewrite(PrewriteRequest) returns (PrewriteResponse);
    rpc Commit(CommitRequest) returns (CommitResponse);
    rpc CheckTxnStatus(CheckTxnStatusRequest) returns (CheckTxnStatusResponse);
    rpc ResolveLock(ResolveLockRequest) returns (ResolveLockResponse);
    rpc AcquirePessimisticLock(AcquirePessimisticLockRequest) returns (AcquirePessimisticLockResponse);
    // Coprocessor
    rpc ExecuteCoprocessor(CoprocessorRequest) returns (CoprocessorResponse);
}

message CoprocessorRequest {
    RegionContext context = 1;
    enum CoprocessorType {
        COUNT = 0;
        SUM = 1;
    }
    CoprocessorType type = 2;
    
    // Scan Range
    bytes start_key = 3;
    bytes end_key = 4;
    uint64 start_ts = 5;
    
    // Filter
    bytes filter_value = 6;
    
    enum FilterOperator {
        EQUAL = 0;
        NOT_EQUAL = 1;
        GREATER = 2;
        LESS = 3;
        GREATER_OR_EQUAL = 4;
        LESS_OR_EQUAL = 5;
    }
    FilterOperator filter_operator = 7;
}

message CoprocessorResponse {
    uint64 count = 1;
    int64 sum = 2;
    string error = 3;
}

message AcquirePessimisticLockRequest {
    RegionContext context = 1;
    repeated Mutation mutations = 2; // Only Key and Op matter (Lock/Put/Delete)
    uint64 start_ts = 3;
    bytes primary_key = 4;
    uint64 lock_ttl = 5;
    uint64 for_update_ts = 6; // Usually same as start_ts for Repeatable Read
    bool return_values = 7;   // If true, return the current values
}

message AcquirePessimisticLockResponse {
    string error = 1;
    KeyError key_error = 2; // Locked by others
    repeated bytes values = 3; // Corresponding to mutations
    repeated bool not_found = 4; // If key doesn't exist
}

message ResolveLockRequest {
    RegionContext context = 1;
    uint64 start_ts = 2;
    // 如果是 Commit，需要 CommitTS；如果是 Rollback，commit_ts = 0
    uint64 commit_ts = 3; 
    
    // 需要清理的 Keys (通常是 Secondary Keys)
    repeated bytes keys = 4;
}

message ResolveLockResponse {}

message CheckTxnStatusRequest {
    RegionContext context = 1;
    bytes primary_key = 2;
    uint64 lock_ts = 3;     // 锁的 StartTS
    uint64 current_ts = 4;  // 当前读请求的 StartTS (用于判断 TTL)
    bool rollback_if_not_exist = 5; // 如果没找到任何记录，是否强制回滚
}

message CheckTxnStatusResponse {
    // 事务最终状态
    enum Action {
        NoAction = 0;   // 还在运行，TTL 未过期
        TtlExpire = 1;  // 过期了，已被我 Rollback
        Commit = 2;     // 已经提交了，CommitTS 在下面
        Rollback = 3;   // 已经回滚了
        LockNotExist = 4; // 锁不存在（且没写 Rollback 记录，通常伴随 Action=Rollback）
    }
    Action action = 1;
    uint64 commit_ts = 2; // 如果是 Commit 状态
    uint64 lock_ttl = 3;  // 如果是 NoAction，返回剩余 TTL
}


message RegionEpoch {
    uint64 conf_ver = 1;
    uint64 version = 2;
}

message Peer {
    uint64 id = 1;
    uint64 store_id = 2;
}

message ChangePeer {
    enum ChangeType {
        ADD_NODE = 0;
        REMOVE_NODE = 1;
    }
    ChangeType change_type = 1;
    Peer peer = 2;
}

message Region {
    uint64 id = 1;
    bytes start_key = 2;
    bytes end_key = 3;
    RegionEpoch region_epoch = 4;
    repeated Peer peers = 5;
}

message RegionContext {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2;
    Peer peer = 3;
}

message SnapshotChunk {
    uint64 region_id = 1;
    // 整个文件的元数据
    uint64 file_size = 2;
    uint64 checksum = 3; // CRC32
    
    // 当前块
    uint64 offset = 4;
    bytes data = 5;
    bool is_last = 6; // 是否最后一块
    
    bytes raft_snapshot_data = 7; 
}

// --- 请求/响应定义 ---

message PrewriteRequest {
    RegionContext context = 1;
    // 批处理多个 Mutation
    repeated Mutation mutations = 2;
    // 事务开始时间
    uint64 start_ts = 3;
    // Primary Key (用于故障恢复)
    bytes primary_key = 4;
    uint64 lock_ttl = 5;
    // 1PC 优化标记
    bool use_1pc = 6;
    uint64 commit_ts = 7;
    // Async Commit 字段
    bool use_async_commit = 8;
    repeated bytes secondaries = 9;
    uint64 min_commit_ts = 10;
    // Pessimistic Transaction
    repeated bool is_pessimistic_lock = 11; // Corresponding to mutations
    uint64 for_update_ts = 12;
}

message Mutation {
    enum Op {
        Put = 0;
        Delete = 1;
        Lock = 2;
    }
    Op op = 1;
    bytes key = 2;
    bytes value = 3;
}

message WriteRequest {
    RegionContext context = 1;
    repeated Mutation mutations = 2;
}

message WriteResponse {
    string error = 1;
}

message PrewriteResponse {
    // 错误信息
    string error = 1; // 空表示成功
    // 如果有 Write Conflict
    WriteConflict conflict = 2;
    // 如果有 KeyLocked
    KeyError key_error = 3;
    // 1PC 结果
    bool one_pc_committed = 4;
    uint64 one_pc_commit_ts = 5;
    // Parallel Commit 结果
    uint64 min_commit_ts = 6;
}

message WriteConflict {
    uint64 start_ts = 1;
    uint64 conflict_ts = 2;
    bytes key = 3;
    bytes primary = 4;
}

message KeyError {
    bytes key = 1;
    // 锁信息
    LockInfo lock_info = 2;
}

message LockInfo {
    bytes primary_key = 1;
    uint64 lock_version = 2;
    bytes key = 3;
    uint64 ttl = 4;
    bool is_pessimistic_lock = 5;
    uint64 for_update_ts = 6;
    bool use_async_commit = 7;
    uint64 min_commit_ts = 8;
    repeated bytes secondaries = 9;
}

message CommitRequest {
    RegionContext context = 1;
    uint64 start_ts = 2;
    uint64 commit_ts = 3;
    repeated bytes keys = 4;
}

message CommitResponse {
    string error = 1;
}

message GetRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
    uint64 start_ts = 3;
}

message GetResponse {
    bytes value = 1;
}

message PutRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
    bytes value = 3;
}

message PutResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

message DeleteRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message DeleteResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

// --- Raft 内部指令 ---

message RaftRequestHeader {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2;
    Peer peer = 3;
    bytes uuid = 4; // 用于异步通知结果
}

message RaftCommand {
    RaftRequestHeader header = 1;
    enum CmdType {
        NORMAL = 0; // Put, Delete
        ADMIN = 1;  // Split, Compact, ConfChange
        TXN = 2;    // Transaction
    }
    CmdType type = 2;

    enum OpType {
        PUT = 0;
        DELETE = 1;
    }
    OpType op = 3;
    bytes key = 4;
    bytes value = 5;
    // ----------------

    AdminRequest admin_request = 6;
    
    // Transaction Requests
    PrewriteRequest prewrite_request = 7;
    CommitRequest commit_request = 8;
    ResolveLockRequest resolve_lock_request = 9;
    AcquirePessimisticLockRequest acquire_pessimistic_lock_request = 10;
}

message AdminRequest {
    enum AdminCmdType {
        SPLIT = 0;
        COMPACT = 1;
        CONF_CHANGE = 2;
        MERGE = 3;
    }
    AdminCmdType cmd_type = 1;
    SplitRequest split = 2;
    ChangePeer change_peer = 3;
    MergeRequest merge = 4;
}

message KeyValue {
    bytes key = 1;
    bytes value = 2;
}

message MergeRequest {
    uint64 target_region_id = 1;
    RegionEpoch target_region_epoch = 2;
    Region source_region = 3;
    repeated KeyValue data = 4;
}


message SplitRequest {
    // 分裂点 Key (Encoded or User Key? 通常用 Encoded Data Key)
    bytes split_key = 1;
    // 新分裂出来的 Region ID
    uint64 new_region_id = 2;
    // 新 Region 在各个 Store 上的 Peer ID
    // repeated uint64 new_peer_ids = 3;
    repeated Peer new_peers = 4; 
}

message BatchRaftCommand {
    repeated RaftCommand commands = 1;
}

message RaftMessage {
    uint64 region_id = 1; // 接收端的 RegionID
    bytes data = 2;       // 实际的 raftpb.Message 序列化数据
    uint64 to_peer_id = 3; // 接收端的 PeerID (用于路由到正确的 RawNode)
    uint64 from_peer_id = 4; // 发送端的 PeerID
    uint64 to_store_id = 5;
}

message BatchRaftMessage {
    repeated RaftMessage msgs = 1;
}

message RaftResponse {} // 空响应，只要不报错就代表收到

message RaftLocalState {
    uint64 term = 1;
    uint64 vote = 2;
    uint64 commit = 3;
    uint64 last_index = 4;
}

// 本地 Apply 状态
message RaftApplyState {
    uint64 applied_index = 1;
    RaftTruncatedState truncated_state = 2;
}

message RaftTruncatedState {
    uint64 index = 1;
    uint64 term = 2;
}

message UpdateConfigRequest {
    // 如果 > 0 则更新，否则忽略
    double gc_threshold = 1;
    uint64 gc_safe_point = 2;
}

message RaftSnapshotMetadata {
    uint64 index = 1;
    uint64 term = 2;
    RaftConfState conf_state = 3;
}

message RaftConfState {
    repeated uint64 voters = 1;
    repeated uint64 learners = 2;
}


message UpdateConfigResponse {}
