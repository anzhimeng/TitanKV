syntax = "proto3";

package titankv;
option go_package = "titankv/api/titankvpb";

// 定义 KV 服务
service TitanKV {
    // Client API
    rpc Get(GetRequest) returns (GetResponse);
    rpc Put(PutRequest) returns (PutResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);

    // 【新增】Raft Node API
    // 用于节点间传输 Raft 消息 (Vote, AppendEntries, etc.)
    rpc Raft(RaftMessage) returns (RaftResponse);
    rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
}

message RegionEpoch {
    uint64 conf_ver = 1;
    uint64 version = 2;
}

message Peer {
    uint64 id = 1;
    uint64 store_id = 2;
}

message RegionContext {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2;
    Peer peer = 3;
}

// --- 请求/响应定义 ---

message GetRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message GetResponse {
    bytes value = 1;
}

message PutRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
    bytes value = 3;
}

message PutResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

message DeleteRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message DeleteResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

// --- Raft 内部指令 ---

message RaftCommand {
    enum OpType {
        PUT = 0;
        DELETE = 1;
    }
    OpType op = 1;
    bytes key = 2;
    bytes value = 3;
}

message BatchRaftCommand {
    repeated RaftCommand commands = 1;
}
message RaftMessage {
    // 直接传输序列化后的 etcd/raft/raftpb.Message
    bytes data = 1;
}

message RaftResponse {} // 空响应，只要不报错就代表收到

message UpdateConfigRequest {
    // 如果 > 0 则更新，否则忽略
    double gc_threshold = 1;
}

message UpdateConfigResponse {}