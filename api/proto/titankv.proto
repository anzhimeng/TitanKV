syntax = "proto3";


package titankv;
option go_package = "titankv/api/titankvpb";

// 定义 KV 服务
service TitanKV {
    // Client API
    rpc Get(GetRequest) returns (GetResponse);
    rpc Put(PutRequest) returns (PutResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);

    // 【新增】Raft Node API
    // 用于节点间传输 Raft 消息 (Vote, AppendEntries, etc.)
    rpc Raft(RaftMessage) returns (RaftResponse);
    rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
    rpc StreamSnapshot(stream SnapshotChunk) returns (RaftResponse);
}

message RegionEpoch {
    uint64 conf_ver = 1;
    uint64 version = 2;
}

message Peer {
    uint64 id = 1;
    uint64 store_id = 2;
}

message ChangePeer {
    enum ChangeType {
        ADD_NODE = 0;
        REMOVE_NODE = 1;
    }
    ChangeType change_type = 1;
    Peer peer = 2;
}

message Region {
    uint64 id = 1;
    bytes start_key = 2;
    bytes end_key = 3;
    RegionEpoch region_epoch = 4;
    repeated Peer peers = 5;
}

message RegionContext {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2;
    Peer peer = 3;
}

message SnapshotChunk {
    uint64 region_id = 1;
    // 整个文件的元数据
    uint64 file_size = 2;
    uint64 checksum = 3; // CRC32
    
    // 当前块
    uint64 offset = 4;
    bytes data = 5;
    bool is_last = 6; // 是否最后一块
    
    bytes raft_snapshot_data = 7; 
}

// --- 请求/响应定义 ---

message GetRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message GetResponse {
    bytes value = 1;
}

message PutRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
    bytes value = 3;
}

message PutResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

message DeleteRequest {
    RegionContext context = 1; // 【新增】
    bytes key = 2;
}

message DeleteResponse {
    int32 err_code = 1;
    uint64 leader_id = 2;
}

// --- Raft 内部指令 ---

message RaftRequestHeader {
    uint64 region_id = 1;
    RegionEpoch region_epoch = 2;
    Peer peer = 3;
}

message RaftCommand {
    RaftRequestHeader header = 1;
    enum CmdType {
        NORMAL = 0; // Put, Delete
        ADMIN = 1;  // Split, Compact, ConfChange
    }
    CmdType type = 2;

    enum OpType {
        PUT = 0;
        DELETE = 1;
    }
    OpType op = 3;
    bytes key = 4;
    bytes value = 5;
    // ----------------

    AdminRequest admin_request = 6;
}

message AdminRequest {
    enum AdminCmdType {
        SPLIT = 0;
        COMPACT = 1;
        // CONF_CHANGE ... (使用 etcd 原生 EntryConfChange 处理，这里可以不定义)
    }
    AdminCmdType cmd_type = 1;
    SplitRequest split = 2;
}


message SplitRequest {
    // 分裂点 Key (Encoded or User Key? 通常用 Encoded Data Key)
    bytes split_key = 1;
    // 新分裂出来的 Region ID
    uint64 new_region_id = 2;
    // 新 Region 在各个 Store 上的 Peer ID
    repeated uint64 new_peer_ids = 3; 
}

message BatchRaftCommand {
    repeated RaftCommand commands = 1;
}
message RaftMessage {
    uint64 region_id = 1; // 接收端的 RegionID
    bytes data = 2;       // 实际的 raftpb.Message 序列化数据
    uint64 to_peer_id = 3; // 接收端的 PeerID (用于路由到正确的 RawNode)
    uint64 from_peer_id = 4; // 发送端的 PeerID
}

message RaftResponse {} // 空响应，只要不报错就代表收到

message RaftLocalState {
    uint64 term = 1;
    uint64 vote = 2;
    uint64 commit = 3;
    uint64 last_index = 4;
}

// 本地 Apply 状态
message RaftApplyState {
    uint64 applied_index = 1;
    RaftTruncatedState truncated_state = 2;
}

message RaftTruncatedState {
    uint64 index = 1;
    uint64 term = 2;
}

message UpdateConfigRequest {
    // 如果 > 0 则更新，否则忽略
    double gc_threshold = 1;
}

message RaftSnapshotMetadata {
    uint64 index = 1;
    uint64 term = 2;
    RaftConfState conf_state = 3;
}

message RaftConfState {
    repeated uint64 voters = 1;
    repeated uint64 learners = 2;
}


message UpdateConfigResponse {}